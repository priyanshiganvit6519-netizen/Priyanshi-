<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    background:#0f2027;
    color:white;
    text-align:center;
}
</style>
</head>

<body>

<h2>Energy Prediction ⚡</h2>

<canvas id="chart"></canvas>
<script>
let data=[200,300,250,400];
let chart=new Chart(document.getElementById("chart"),{
type:'line',
data:{
labels:["jan","feb","March","April"],
datasets:[{label:"Energy",data:data}]
}
});

setInterval(()=>{
let v=Math.floor(Math.random()*500);
data.push(v);
data.shift();
chart.update();
},2000);
</script>

<br><br>
<button onclick="location.href='index.html'">Back</button>

</body>
</html>
