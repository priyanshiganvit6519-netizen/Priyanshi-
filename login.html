<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:#0f2027;
    color:white;
    text-align:center;
    padding-top:100px;
}
input{
    padding:10px;
    margin:10px;
}
button{
    padding:10px;
    background:#00c853;
    border:none;
    color:white;
}
</style>
</head>

<body>

<h2>Login 🔐</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<script>
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u=="admin" && p=="1234"){
        alert("Login Success ✅");
        window.location.href="index.html";
    }else{
        alert("Wrong ❌");
    }
}
</script>

</body>
</html>
